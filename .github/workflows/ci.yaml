name: CI Pipeline

on: push

jobs:
  project-testing:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v3

      - name: setup python
        uses: actions/setup-python@v2
        with: 
          python-version: '3.10'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: install dependencies
        run: |
          pip install -r requirements.txt

      - name: run pipeline
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          dvc repro
#dvc workflow repro
      - name: Run model tests
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: |
          python -m unittest tests/test_model.py
#well model promotion can be done manually
      - name: Promote model to production
        if: success()
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: python scripts/promote_model.py

      - name: Run Flask app tests
        if: success()
        env:
          DAGSHUB_PAT: ${{ secrets.DAGSHUB_PAT }}
        run: python -m unittest tests/test_flask_app.py
#deploying the flask app through dockerhub
      
      - name: Login to AWS ECR
        if: success()
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 905418184838.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        if: success()
        run: |
          docker build -t supi_ecr .

      - name: Tag Docker image
        if: success()
        run: |
          docker tag supi_ecr:latest 905418184838.dkr.ecr.ap-south-1.amazonaws.com/supi_ecr:latest
#tagging the image with ecr repo url and pushing it to ecr repo

      - name: Push Docker image to AWS ECR
        if: success()
        run: |
          docker push 905418184838.dkr.ecr.ap-south-1.amazonaws.com/supi_ecr:latest
          
      - name: Deploy to EC2   #must install docker and awcli on your machine and add your ec2 user to docker group
        if: success()
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.EC2_HOST }} #take public id of your ec2 machine
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }} #iam access and secret key of your aws account
            aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws configure set default.region ap-south-1
            aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 905418184838.dkr.ecr.ap-south-1.amazonaws.com
            docker pull 905418184838.dkr.ecr.ap-south-1.amazonaws.com/supi_ecr:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 80:5000 --name supi-emotional-app \
              -e DAGSHUB_PAT=${{ secrets.DAGSHUB_PAT }} \
              905418184838.dkr.ecr.ap-south-1.amazonaws.com/supi_ecr:latest